<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Web Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Join/Login Screen -->
    <div id="join-screen" class="overlay">
        <div class="box">
            <h2>🔒 Secure Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <input type="text" id="roomId" placeholder="Room ID">
            <button onclick="handleLogin()">Login & Join</button>
            <p id="error-msg" class="error"></p>
        </div>
    </div>

    <!-- Main Chat App -->
    <div id="chat-app" class="app" style="display: none;">
        <header class="chat-header">
            <div class="header-top">
                <span>🟢 Room: <b id="currentRoom"></b></span>
                <button onclick="toggleSettings()" class="icon-btn">⚙️ Settings</button>
            </div>
            <div class="user-info">User: <b id="userLabel"></b></div>
        </header>
        <div id="messages" class="chat-box"></div>
        <form id="message-form" class="chat-input">
            <input id="msg" placeholder="Message..." autocomplete="off">
            <button type="submit">Send</button>
        </form>
    </div>

    <!-- Settings Overlay -->
    <div id="settings-overlay" class="overlay" style="display: none;">
        <div class="box">
            <h3>Update Profile</h3>
            <input type="text" id="new-username" placeholder="New Username">
            <input type="password" id="new-password" placeholder="New Password">
            <div class="btn-group">
                <button onclick="saveProfile()">Save</button>
                <button onclick="toggleSettings()" class="cancel">Cancel</button>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
