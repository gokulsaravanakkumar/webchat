<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Chat Login</title>
    <!-- Modern Font -->
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 1. Join/Login Screen -->
        <div id="join-screen" class="card">
            <h3>Welcome Back</h3>
            <div id="error-msg"></div>
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" autocomplete="off">
                <input type="password" id="password" placeholder="Password">
                <input type="text" id="roomId" placeholder="Room ID">
            </div>
            <button onclick="handleLogin()" class="btn-primary">Sign In</button>
        </div>

        <!-- 2. Chat Application Screen -->
        <div id="chat-app" class="card" style="display: none;">
            <h3>Chat Active</h3>
            <div class="info">
                <div class="user-badge">
                    <span class="status-dot"></span>
                    <span id="userLabel"></span>
                </div>
                <div class="room-badge">
                    Room: <b id="currentRoom"></b>
                </div>
            </div>
            <p class="status-text">Connected to secure socket.</p>
            <button onclick="location.reload()" class="btn-secondary">Logout</button>
        </div>
    </div>

    <!-- Socket.io Library -->
    <script src="https://socket.io"></script>
    
    <script>
        let registeredUsers = [
            { username: "phoenix", password: "6369" },
            { username: "cookie", password: "6384" }
        ];

        // Replace with your server URL
        const socket = io("https://your-socket-server.com", { autoConnect: false });

        function handleLogin() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const r = document.getElementById('roomId').value.trim();
            const errorDiv = document.getElementById('error-msg');

            if (!u || !p || !r) {
                errorDiv.innerText = "All fields are required";
                return;
            }

            const user = registeredUsers.find(
                user => user.username.toLowerCase() === u.toLowerCase() && user.password === p
            );

            if (!user) {
                errorDiv.innerText = "Invalid credentials";
                return;
            }

            // Update UI
            document.getElementById('currentRoom').innerText = r;
            document.getElementById('userLabel').innerText = user.username;
            document.getElementById('join-screen').style.display = 'none';
            document.getElementById('chat-app').style.display = 'flex';

            // Socket logic
            socket.connect();
            socket.emit('joinRoom', { username: user.username, roomId: r });
        }
    </script>
</body>
</html>
