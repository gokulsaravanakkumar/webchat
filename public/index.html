<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LAN Chat - Rooms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Join Screen Overlay -->
<div id="join-screen" class="overlay">
    <div class="join-box">
        <h2>Join a Chat Room</h2>
        <input type="text" id="username" placeholder="Your Name...">
        <input type="text" id="roomId" placeholder="Room ID (e.g. 1234)...">
        <button onclick="joinRoom()">Join Chat</button>
    </div>
</div>

<!-- Main Chat App (Hidden by default) -->
<div id="chat-app" class="app" style="display: none;">
    <div class="chat-header">
        💬 Room: <span id="currentRoom"></span>
        <span id="userLabel"></span>
    </div>

    <div id="messages" class="chat-box"></div>

    <form class="chat-input" id="message-form">
        <input id="msg" placeholder="Type a message..." autocomplete="off">
        <button type="submit">➤</button>
    </form>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
